<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background pill -->
  <rect width="220" height="40" rx="6" fill="#07070F"/>

  <!-- NEURO (white) -->
  <text
    x="12" y="28"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="1.5"
    fill="#EAE8F5"
    text-anchor="start"
  >NEURO</text>

  <!-- HACKS (teal) -->
  <text
    x="88" y="28"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="1.5"
    fill="#00D4A8"
    text-anchor="start"
  >HACKS</text>

  <!-- OS badge -->
  <rect x="172" y="11" width="36" height="18" rx="3" fill="rgba(0,212,168,0.12)" stroke="#00D4A8" stroke-width="0.6" opacity="0.9"/>
  <text
    x="190" y="24"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="2"
    fill="#00D4A8"
    text-anchor="middle"
  >OS</text>
</svg>
